---
# ── Play 1: Build artifacts locally ──────────────────────────────────────────
- name: Build locally
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Build backend JAR
      command: ./gradlew bootJar
      args:
        chdir: "{{ playbook_dir }}/../backend"
      changed_when: true

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ playbook_dir }}/../frontend"
      changed_when: true

# ── Play 2: PostgreSQL ────────────────────────────────────────────────────────
- import_playbook: postgres.yml

# ── Play 3: Deploy application ────────────────────────────────────────────────
- name: Deploy ARB application
  hosts: appservers
  become: true

  handlers:
    - name: restart arb
      systemd:
        name: arb
        state: restarted
        daemon_reload: true

    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded

  tasks:

    # ── System packages ────────────────────────────────────────────────────────
    - name: Install EPEL repository
      dnf:
        name: epel-release
        state: present

    - name: Install required packages
      dnf:
        name:
          - java-21-openjdk-headless
          - nginx
          - rsync
          - acl
        state: present

    # ── App user + directory ───────────────────────────────────────────────────
    - name: Create app system user
      user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_dir }}"
        create_home: false

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"

    # ── Backend ────────────────────────────────────────────────────────────────
    - name: Upload JAR
      copy:
        src: "{{ playbook_dir }}/../backend/build/libs/arb.jar"
        dest: "{{ app_dir }}/arb.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart arb

    - name: Create log directory
      file:
        path: "{{ app_dir }}/logs"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create env config directory
      file:
        path: /etc/arb
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"

    - name: Write environment file
      template:
        src: templates/arb.env.j2
        dest: /etc/arb/arb.env
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      notify: restart arb

    - name: Install systemd service
      template:
        src: templates/arb.service.j2
        dest: /etc/systemd/system/arb.service
        mode: "0644"
      notify: restart arb

    - name: Enable and start arb service
      systemd:
        name: arb
        enabled: true
        state: started
        daemon_reload: true

    # ── Server convenience scripts ─────────────────────────────────────────────
    - name: Deploy service management scripts
      template:
        src: "templates/{{ item }}.j2"
        dest: "{{ app_dir }}/{{ item }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      loop:
        - start.sh
        - stop.sh
        - restart.sh
        - status.sh

    # ── Frontend ───────────────────────────────────────────────────────────────
    - name: Create web root
      file:
        path: /var/www/arb
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Set web root writable for sync
      file:
        path: /var/www/arb
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Upload frontend dist
      synchronize:
        src: "{{ playbook_dir }}/../frontend/dist/"
        dest: /var/www/arb/
        delete: true
      become: false

    - name: Set frontend file ownership
      file:
        path: /var/www/arb
        owner: nginx
        group: nginx
        recurse: true

    - name: Install nginx site config
      template:
        src: templates/nginx-arb.conf.j2
        dest: /etc/nginx/conf.d/arb.conf
        mode: "0644"
      notify: reload nginx

    - name: Set SELinux file context for web root
      community.general.sefcontext:
        target: '/var/www/arb(/.*)?'
        setype: httpd_sys_content_t
        state: present

    - name: Apply SELinux context to web files
      command: restorecon -Rv /var/www/arb
      changed_when: false

    - name: Allow nginx to proxy to backend
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true

    - name: Open HTTP port in firewalld
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true

    - name: Ensure nginx is started
      systemd:
        name: nginx
        state: started
        enabled: true
